<style>
    .form{
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    .name{
        flex:1 0 10rem;
    }
    .email{
        flex: 1 0 10rem;
    }
    .button{
        flex:1 0 5 rem;
        background-color: #c0b9a5;
    }

</style>
<form action="" class="form">
    <input type="text" placeholder="Name" class="name"/>
    <input type="email" placeholder="Email" class="email"/>
    <button type="submit" class="button">subscribe</button>
</form>

<p class="animate___animated
        animate_bounce 
        animate_infinite">
        bounce
        flip
        tada
        heartbeat
        headshake
        zoomin
    
</p>
<style>
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-30px);
      }
      60% {
        transform: translateY(-15px);
      }
    }

    .bounce-element {
      width: 100px;
      height: 100px;
      background-color: #3498db;
      border-radius: 50%;
      animation: bounce 2s infinite;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="bounce-element">green</div>
</body>
</html>
