<!-- Design the button for your web page using div element. Using the CSS properties, present it more attractive as much as possible. -->
<!DOCTYPE html>
<html>

<head>
    <title></title>
    <style>
        .button {
            border: solid 2px black;
            font-weight: bolder;
            border-radius: 10px;
            width: 150px;
            padding-left: 70px;
        }
        
        .button:hover {
            color: aqua;
        }
        
        .button:active {
            color: green;
        }
    </style>
</head>

<body>
    <div class="button" role="button">
        IAmButton
    </div>
</body>

</html>
