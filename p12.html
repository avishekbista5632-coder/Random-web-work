<html>
    <style>
        .toggle{
            background-color: orange;
            height: 100%;
            background: linear-gradient(to right,#f8a25c,#e1ec3c);
            color: #fff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: all 0.6s ease-in-out;
        }
        .toggle-panel{
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 30px;
            text-align: center;
            top: 0;
            transform: translateX(0);
            transition: all 0.6s ease-in-out;
        }
        .container.active.toggle{
            transform: translateX(0);
        }

    </style>
    <body>
        <div class="toggle">
            hello
        </div>
        <div class="toggle-panel">
            hello1
        </div>

    </body>
</html>
