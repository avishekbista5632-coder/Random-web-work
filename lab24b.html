<!DOCTYPE html>
<html>

<body>
    <script>
        var sum = 0;
        for (var i = 0; i < 5; i++) {
            var number = prompt("Enter number " + (i + 1) + ":");
            sum += parseFloat(number);
        }
        var average = sum / 5;
        document.write("Average is: " + average);
    </script>
</body>

</html>
