<!DOCTYPE html>
<html>
<head>
  <title></title>
  <script>
function checkNumber(num) {
    if (num > 0) {
        console.log("Positive number");
    } else if (num < 0) {
        console.log("Negative number");
    } else {
        console.log("Zero");
    }
}

  </script>
</head>
<body>
  <button onclick=" checkNumber()">button</button>
</body>
</html>
