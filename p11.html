<!DOCTYPE html>
<html>
    <style>
        body{
            background-color: black;
            display: flex;
            justify-content: center;
            height: 100vh;
            margin:0;
            font-family: 'Raleway',sans-serif;            
        }
        .btn{
            padding: 8px 20px;
            width: 200px;
            height: 50px;
            color: red;
            font-weight: 700;
            border-radius: 10px;
            text-transform: uppercase;
            margin:25px;
            overflow: hidden;
            position: relative;
        }

        .btn:hover{
            background: transparent;
            box-shadow: 0px 0px 20px 5px #00fffc;
        }
        h1{
            background: linear-gradient(to right,#30cfd0 0%,#330867 100%);
            background-clip: text;
            color: transparent;
        }
    </style>
    <body>
        <button class="btn">fuck u</button>
        <h1>Avishek Bista</h1>
    </body>
</html>
