<!DOCTYPE html>

    <style>
        /* a. Use an id selector to change properties. */
        #heading1 {
            color: blue;
        }

        /* b. Use a class selector to change properties. */
        .paragraphs {
            font-style: italic;
        }

        /* c. Use an element selector to change properties. */
        p {
            font-weight: bold;
        }

        /* d. Use a universal selector to change properties. */
        * {
            text-align: center;
        }

        /* e. Use a group or combined selector to change properties. */
        h2, .highlight {
            background-color: yellow;
        }
    </style>
</head>
<body>

    <h1 id="heading1">hello</h1>

    <p class="paragraphs"> paragraph </p>
    <p>p</p>

    <h2 class="highlight">highlight</h2>
    <h2>Section 2</h2>
</body>
</html>
