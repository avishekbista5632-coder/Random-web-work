<html>
    <head>
        <style>
            .content{
                width: 190px;
                height:254px;
                background: #07182E;
                position: relative;
                display: flex;
                place-content: center;
                place-items: center;
                overflow: hidden;
                border-radius: 20px;
            }
            .content p
            {
                z-index: 1;
                color: rgb(255, 255, 255);
                font-size: 2em;  
            }
            .content ::before
            {
                content: '';
                position: absolute;
                width:100px;
                background-image: linear-gradient(180deg,
                rgb(0,183,255)
                rgb(255,48,255));
                height: 130%;
                animation: animate 4s linear infinite;
                transition: all 0.3s linear;
            }
            .content ::after
            {
               content: '';
               position: absolute;
               background-color: #07182E;
               inset: 5px;
               border-radius: 15px; 
            }
        @keyframes animate
        {
            from{transform: rotate(0deg);}
            to{transform: rotate(360deg);}
        }
        </style>
    </head>
    <body>
        <div class="content">
            <p>Card</p>
        </div>
    </body>
</html>
