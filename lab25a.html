<!DOCTYPE html>
<html>
<head>
  <title>Odd or Even</title>
  <script>
    function checkOddEven() {
      var num = parseInt(prompt("Enter a number:"));
      if (num % 2 === 0) {
        alert(num + " is even.");
      } else {
        alert(num + " is odd.");
      }
    }
  </script>
</head>
<body>
  <button onclick="checkOddEven()">Check Odd/Even</button>
</body>
</html>
