<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paragraph Colors</title>
  <style>
    #para1 { background-color: rgb(255, 0, 0); color: rgb(0, 255, 0); }
    #para2 { background-color: rgb(0, 0, 255); color: rgb(255, 255, 0); }
    #para3 { background-color: rgb(128, 0, 128); color: rgb(255, 255, 255); }
    #para4 { background-color: rgb(255, 165, 0); color: rgb(0, 0, 0); }
    #para5 { background-color: rgb(0, 128, 0); color: rgb(255, 255, 255); }
    #para6 { background-color: rgb(255, 255, 0); color: rgb(0, 0, 0); }
    #para7 { background-color: rgb(0, 0, 128); color: rgb(255, 255, 255); }
    #para8 { background-color: rgb(255, 69, 0); color: rgb(0, 0, 0); }
    #para9 { background-color: rgb(128, 128, 128); color: rgb(255, 255, 255); }
    #para10 { background-color: rgb(0, 0, 0); color: rgb(255, 255, 255); }
    #div1 { background-color: hsl(0, 100%, 50%); }
    #div2 { background-color: hsl(45, 100%, 50%); }
    #div3 { background-color: hsl(90, 100%, 50%); }
    #div4 { background-color: hsl(135, 100%, 50%); }
    #div5 { background-color: hsl(180, 100%, 50%); }
    #div6 { background-color: hsl(225, 100%, 50%); }
    #div7 { background-color: hsl(270, 100%, 50%); }
    #div8 { background-color: hsl(315, 100%, 50%); }
    #div9 { background-color: hsl(30, 100%, 50%); }
    #div10 { background-color: hsl(60, 100%, 50%); }
  </style>
</head>
<body>
  <p style="color: red;">Paragraph 1</p>
  <p style="color: orange;">Paragraph 2</p>
  <p style="color: yellow;">Paragraph 3</p>
  <p style="color: green;">Paragraph 4</p>
  <p style="color: blue;">Paragraph 5</p>
  <p style="color: indigo;">Paragraph 6</p>
  <p style="color: violet;">Paragraph 7</p>
  <p style="color: brown;">Paragraph 8</p>
  <p style="color: gray;">Paragraph 9</p>
  <p style="color: black;">Paragraph 10</p>
  <p id="para1">Paragraph 1</p>
  <p id="para2">Paragraph 2</p>
  <p id="para3">Paragraph 3</p>
  <p id="para4">Paragraph 4</p>
  <p id="para5">Paragraph 5</p>
  <p id="para6">Paragraph 6</p>
  <p id="para7">Paragraph 7</p>
  <p id="para8">Paragraph 8</p>
  <p id="para9">Paragraph 9</p>
  <p id="para10">Paragraph 10</p>
  <div id="div1">1</div>
  <div id="div2">2</div>
  <div id="div3">3</div>
  <div id="div4">4</div>
  <div id="div5">5</div>
  <div id="div6">6</div>
  <div id="div7">7</div>
  <div id="div8">8</div>
  <div id="div9">9</div>
  <div id="div10">1</div>
</body>
</html>
