

<!DOCTYPE html>
<html>
<head>
	<title>vertical menu</title>
	<style type="text/css">
		ul{
			list-style: none;
			padding: 0px;
			margin: 0px;

		}

		ul li a{
			text-decoration: none;
			background-color: darkgray;
			display: block;
			width: 100px;
			text-align: center;
			margin: 5px;
			padding: 10px;
			border: 2px solid lightsalmon;
			border-radius: 5px;
			height: 25px;
			line-height: 25px;
		}

		ul li a:hover{
			background-color: oldlace;
			color: lightsalmon;
		}
	</style>
</head>
<body>
	<ul>
		<li><a href="">HTML</a></li>
        <li><a href="">CSS</a></li>
        <li><a href="">JAVASCRIPT</a></li>
		<li><a href="">BOOTSTRAPT</a></li>
        <li><a href="">JQUERY</a></li>
        <li><a href="">XML</a></li>
        <li><a href="">PHP</a></li>

	</ul>

</body>
</html>
